name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentic
          POSTGRES_PASSWORD: agentic
          POSTGRES_DB: agentic
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Install golang-migrate
      run: |
        curl -L https://github.com/golang-migrate/migrate/releases/download/v4.16.2/migrate.linux-amd64.tar.gz | tar xvz
        sudo mv migrate /usr/local/bin/
    
    - name: Install ginkgo
      run: go install github.com/onsi/ginkgo/v2/ginkgo@latest
    
    - name: Run migrations
      run: migrate -path ./migrations -database "postgres://agentic:agentic@localhost:5432/agentic?sslmode=disable" up
      env:
        DATABASE_URL: postgres://agentic:agentic@localhost:5432/agentic?sslmode=disable
    
    - name: Run tests
      run: ginkgo -r ./
      env:
        DATABASE_URL: postgres://agentic:agentic@localhost:5432/agentic?sslmode=disable
    
    - name: Lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
