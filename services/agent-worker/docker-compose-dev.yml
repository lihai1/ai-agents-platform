version: '3.8'

services:
  nats:
    image: nats:latest
    container_name: agentic-nats-dev
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js"

  postgres:
    image: postgres:16-alpine
    container_name: agentic-postgres-dev
    environment:
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
      POSTGRES_DB: agentic
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic"]
      interval: 5s
      timeout: 5s
      retries: 5
